<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>محادثة – رسائل مختلفة</title>
  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 400px;
      height: 550px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .username-container {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 10px;
      background: #fafafa;
    }

    .username-container input {
      flex: 1;
      padding: 8px;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      border-bottom: 1px solid #ddd;
    }

    .message {
      background: #e0e0e0;
      padding: 8px 12px;
      margin: 5px 0;
      border-radius: 5px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #555;
      margin-bottom: 3px;
    }

    .input-container {
      display: flex;
    }

    input[type="text"] {
      flex: 1;
      border: none;
      padding: 10px;
      font-size: 14px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="username-container">
      <input type="text" id="usernameInput" placeholder="اكتب اسمك هنا">
      <button onclick="setUsername()">تأكيد</button>
    </div>

    <div class="messages" id="messages"></div>
    <div class="input-container">
      <input type="text" id="messageInput" placeholder="اكتب رسالة..." disabled>
      <button onclick="sendMessage()" disabled id="sendBtn">إرسال</button>
    </div>
  </div>

  <script>
    let username = "";

    function setUsername() {
      const input = document.getElementById("usernameInput");
      const name = input.value.trim();
      if (name !== "") {
        username = name;
        input.disabled = true;
        document.querySelector(".username-container button").disabled = true;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("messageInput").focus();
      }
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (text !== "" && username !== "") {
        const messageBox = document.getElementById("messages");
        const msg = document.createElement("div");
        msg.className = "message";

        const time = new Date();
        const hours = time.getHours().toString().padStart(2, '0');
        const minutes = time.getMinutes().toString().padStart(2, '0');
        const timeStr = `${hours}:${minutes}`;

        msg.innerHTML = `
          <div class="message-header">
            <span><strong>${username}</strong></span>
            <span>${timeStr}</span>
          </div>
          <div class="message-text">${text}</div>
        `;

        messageBox.appendChild(msg);
        input.value = "";
        messageBox.scrollTop = messageBox.scrollHeight;
      }
    }
  </script>
</body>
</html>
