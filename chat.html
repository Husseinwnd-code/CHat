<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محادثة – رسائل مختلفة</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #172033;
    }

    .chat-container {
      width: min(100%, 440px);
      height: min(720px, calc(100vh - 48px));
      min-height: 520px;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.14);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .username-container,
    .chat-actions,
    .input-container {
      padding: 14px;
      background: #fbfdff;
      display: flex;
      gap: 10px;
    }

    .username-container {
      border-bottom: 1px solid #e6edf5;
    }

    .chat-actions {
      justify-content: flex-start;
      border-bottom: 1px solid #e6edf5;
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .messages {
      flex: 1;
      padding: 18px 14px;
      overflow-y: auto;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      align-self: flex-start;
      background: #e7f5f1;
      border: 1px solid #c6e7df;
      padding: 10px 12px;
      border-radius: 14px 14px 4px 14px;
      max-width: 82%;
      word-wrap: break-word;
      line-height: 1.5;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      font-size: 12px;
      color: #536171;
      margin-bottom: 5px;
    }

    .message-text {
      color: #172033;
      font-size: 15px;
    }

    .input-container {
      border-top: 1px solid #e6edf5;
    }

    input[type="text"] {
      flex: 1;
      min-width: 0;
      border: 1px solid #d8e2ee;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      color: #172033;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: #16836f;
      box-shadow: 0 0 0 3px rgba(22, 131, 111, 0.16);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: #16836f;
      transition: background 0.2s, transform 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      background: #126c5c;
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .clear-chat-btn {
      background: #d64a4a;
    }

    .clear-chat-btn:hover:not(:disabled) {
      background: #b93636;
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
        align-items: stretch;
      }

      .chat-container {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        border-radius: 0;
        border: none;
      }

      .username-container,
      .input-container {
        padding: 12px;
      }

      .username-container {
        flex-direction: column;
      }

      .chat-actions {
        padding: 10px 12px;
      }

      .messages {
        padding: 14px 12px;
      }

      .message {
        max-width: 92%;
      }

      button {
        padding-inline: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="username-container">
      <input type="text" id="usernameInput" placeholder="اكتب اسمك هنا">
      <button onclick="setUsername()">تأكيد</button>
    </div>

    <div class="chat-actions">
      <button class="clear-chat-btn" onclick="clearChat()">مسح المحادثة</button>
    </div>

    <div class="messages" id="messages"></div>
    <div class="input-container">
      <input type="text" id="messageInput" placeholder="اكتب رسالة..." disabled>
      <button onclick="sendMessage()" disabled id="sendBtn">إرسال</button>
    </div>
  </div>

  <script>
    let username = "";

    function setUsername() {
      const input = document.getElementById("usernameInput");
      const name = input.value.trim();
      if (name !== "") {
        username = name;
        input.disabled = true;
        document.querySelector(".username-container button").disabled = true;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("messageInput").focus();
      }
    }

    function clearChat() {
      document.getElementById("messages").innerHTML = "";
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (text !== "" && username !== "") {
        const messageBox = document.getElementById("messages");
        const msg = document.createElement("div");
        msg.className = "message";

        const time = new Date();
        const hours = time.getHours().toString().padStart(2, '0');
        const minutes = time.getMinutes().toString().padStart(2, '0');
        const timeStr = `${hours}:${minutes}`;

        const header = document.createElement("div");
        header.className = "message-header";

        const nameSpan = document.createElement("span");
        const strong = document.createElement("strong");
        strong.textContent = username;
        nameSpan.appendChild(strong);

        const timeSpan = document.createElement("span");
        timeSpan.textContent = timeStr;

        const messageText = document.createElement("div");
        messageText.className = "message-text";
        messageText.textContent = text;

        header.appendChild(nameSpan);
        header.appendChild(timeSpan);
        msg.appendChild(header);
        msg.appendChild(messageText);

        messageBox.appendChild(msg);
        input.value = "";
        messageBox.scrollTop = messageBox.scrollHeight;
      }
    }
  </script>
</body>
</html>
